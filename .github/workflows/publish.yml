name: 'Build Artifacts'

on:
  release:
    types: [created]

jobs:
    linux:
        strategy:
            fail-fast: false
            matrix:
                include:
                  - name: x86_64 SDL 2
                    flags: '-DNBC_PLATFORM=sdl2 -DNBC_GFX_API=OGL'
                    packages: 'libsdl2-dev libopenal-dev'
                    runner: ubuntu-24.04
                    arch: x86_64
                  - name: i686 SDL 2
                    flags: '-DNBC_PLATFORM=sdl2 -DNBC_GFX_API=OGL -DCMAKE_C_FLAGS=-m32 -DCMAKE_CXX_FLAGS=-m32'
                    packages: 'gcc-multilib g++-multilib libsdl2-dev:i386 libopenal-dev:i386'
                    runner: ubuntu-22.04
                    arch: i686
                  - name: aarch64 SDL 2
                    flags: '-DNBC_PLATFORM=sdl2 -DNBC_GFX_API=OGL'
                    packages: 'libsdl2-dev libopenal-dev'
                    runner: ubuntu-24.04-arm
                    arch: aarch64
        name: Linux (${{ matrix.name }})
        runs-on: ${{ matrix.runner }}
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v6
            with:
                submodules: true
          - name: Enable i386 packages
            if: ${{ matrix.arch == 'i686' }}
            run: sudo dpkg --add-architecture i386
          - name: Install Dependencies
            run: |
                sudo apt-get update
                sudo apt-get install --no-install-recommends -y \
                    build-essential \
                    cmake ninja-build \
                    ${{ matrix.packages }}
          - name: Build
            run: |
                mkdir build
                cd build
                cmake .. -GNinja \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON \
                    ${{ matrix.flags }}
                cmake --build .
                strip Vercraft
          - name: Pack release
            run: |
                mkdir Vercraft
                mv game/assets build/Vercraft Vercraft
                tar -czf Vercraft-Linux-${{ matrix.arch }}.tar.gz Vercraft
          - uses: alexellis/upload-assets@0.4.1
            env:
              GITHUB_TOKEN: ${{ github.token }}
            with:
              asset_paths: '["Vercraft-Linux-${{ matrix.arch }}.tar.gz"]'

    flatpak:
        strategy:
            fail-fast: false
            matrix:
                include:
                  - name: x86_64 SDL 2
                    gfx: OGL
                    arch: x86_64
                    runner: ubuntu-24.04
                  - name: aarch64 SDL 2
                    gfx: OGL
                    arch: aarch64
                    runner: ubuntu-24.04-arm
        name: Flatpak (${{ matrix.name }})
        runs-on: ${{ matrix.runner }}
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v6
            with:
                submodules: true
          - name: Install Dependencies
            run: |
                sudo apt-get update
                sudo apt-get install --no-install-recommends -y flatpak
                flatpak --user remote-add --if-not-exists flathub https://dl.flathub.org/repo/flathub.flatpakrepo
                flatpak --user install -y \
                    org.freedesktop.Platform/${{ matrix.arch }}/25.08 \
                    org.freedesktop.Sdk/${{ matrix.arch }}/25.08
          - name: Build
            run: ./platforms/linux/build-flatpak.sh
            env:
              ARCH: ${{ matrix.arch }}
              NBC_GFX_API: ${{ matrix.gfx }}
          - uses: alexellis/upload-assets@0.4.1
            env:
              GITHUB_TOKEN: ${{ github.token }}
            with:
              asset_paths: '["platforms/linux/build-flatpak/Vercraft-Linux-${{ matrix.arch }}.flatpak"]'

    macos:
        strategy:
            fail-fast: false
        name: macOS
        runs-on: macos-26
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v6
            with:
                submodules: true
          - name: Install Dependencies
            run: |
              brew install llvm@21 gmp mpfr mpc
              # current homebrew cmake segfaults when building the ppc binary
              wget -O- https://github.com/Kitware/CMake/releases/download/v4.2.3/cmake-4.2.3-macos-universal.tar.gz | tar -xz
          - name: Build
            run: |
              LLVM_CONFIG="$(brew --prefix)/opt/llvm@21/bin/llvm-config" \
                  GMP="$(brew --prefix)" \
                  MPFR="$(brew --prefix)" \
                  MPC="$(brew --prefix)" \
                  PATH="$PWD/cmake-4.2.3-macos-universal/CMake.app/Contents/bin:$PATH" \
                  ./platforms/macos/build.sh
          - name: Pack release
            run: |
                mv platforms/macos/build/Vercraft.app .
                zip -r Vercraft-macOS.zip Vercraft.app
          - uses: alexellis/upload-assets@0.4.1
            env:
              GITHUB_TOKEN: ${{ github.token }}
            with:
              asset_paths: '["Vercraft-macOS.zip"]'

    ios:
        name: iOS
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v6
            with:
                submodules: true
          - name: Install Dependencies
            run: |
                wget https://apt.llvm.org/llvm.sh
                sudo bash llvm.sh 22
                sudo apt-get update
                sudo apt-get install --no-install-recommends -y \
                    cmake \
                    clang-22 \
                    libplist-utils \
                    libplist-dev \
                    libssl-dev

          - name: Build
            run: |
              ./platforms/ios/build.sh
              mv platforms/ios/build/Vercraft.ipa Vercraft-iOS.ipa
            env:
              CLANG: clang-22
              AR: llvm-ar-22
              RANLIB: llvm-ranlib-22
              LLVM_CONFIG: llvm-config-22
          - uses: alexellis/upload-assets@0.4.1
            env:
              GITHUB_TOKEN: ${{ github.token }}
            with:
              asset_paths: '["Vercraft-iOS.ipa"]'

    android:
        strategy:
            fail-fast: false
            matrix:
                include:
                  # - name: Native
                  #   directory: platforms/android/project
                  - name: SDL 2
                    directory: platforms/sdl/sdl2/android
        name: Android (${{ matrix.name }})
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v6
            with:
                submodules: true
          - name: Setup JDK
            uses: actions/setup-java@v4
            with:
                java-version: '17'
                distribution: 'temurin'
                cache: gradle
          - name: Build
            run: |
                cd ${{ matrix.directory }}
                ./gradlew assembleRelease
          - uses: upup-company/apksigner-android@v1
            id: sign_apk
            with:
              releaseDirectory: ${{ matrix.directory }}/app/build/outputs/apk/release
              signingKeyBase64: ${{ secrets.ANDROID_KEYSTORE }}
              keyStorePassword: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
              alias: remcpe
            env:
              BUILD_TOOLS_VERSION: 36.1.0
          - name: Rename APK
            run: mv ${{ steps.sign_apk.outputs.signedReleaseFile }} Vercraft-Android.apk
          - uses: alexellis/upload-assets@0.4.1
            env:
              GITHUB_TOKEN: ${{ github.token }}
            with:
              asset_paths: '["Vercraft.apk"]'

    windows:
        strategy:
            fail-fast: false
            matrix:
                include:
                  - name: x86_64 (OGL)
                    arch: x86_64
                    gfx-api: OGL
                  - name: i686 (OGL)
                    arch: i686
                    gfx-api: OGL
        name: Windows (${{ matrix.name }})
        runs-on: ubuntu-24.04
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v6
            with:
                submodules: true
          - name: Install Dependencies
            run: |
                sudo apt-get update
                sudo apt-get install --no-install-recommends -y \
                    build-essential \
                    cmake \
                    ccache \
                    libgmp-dev \
                    libmpfr-dev \
                    libmpc-dev
          - name: Build
            run: ./platforms/windows/build.sh
            env:
              ARCH: ${{ matrix.arch }}
              NBC_GFX_API: ${{ matrix.gfx-api }}
              NOSTRIP: 1
          - name: Pack release
            run: |
                mv platforms/windows/build/Vercraft .
                zip -r Vercraft-Windows-${{ matrix.arch }}.zip Vercraft
          - uses: alexellis/upload-assets@0.4.1
            env:
              GITHUB_TOKEN: ${{ github.token }}
            with:
              asset_paths: '["Vercraft-Windows-${{ matrix.arch }}.zip"]'

    switch:
        name: Nintendo Switch
        runs-on: ubuntu-24.04
        container:
            image: devkitpro/devkita64@sha256:a52e05e06951c025fe23127252555e2f94d944458ff4f19028ba297e5ffc99fd
        steps:
          - name: Checkout Repository
            uses: actions/checkout@v6
            with:
                submodules: true
          - name: Build Switch binary
            run: |
                mkdir build
                cd build
                /opt/devkitpro/portlibs/switch/bin/aarch64-none-elf-cmake .. -GNinja \
                    -DCMAKE_BUILD_TYPE=Release \
                    -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
                /opt/devkitpro/portlibs/switch/bin/aarch64-none-elf-cmake --build .
                mv platforms/sdl/sdl2/Vercraft.nro .
          - name: Pack release
            run: |
                mkdir Vercraft
                mv game/assets build/Vercraft.nro Vercraft
                zip -r Vercraft-Switch.zip Vercraft
          - uses: alexellis/upload-assets@0.4.1
            env:
              GITHUB_TOKEN: ${{ github.token }}
            with:
              asset_paths: '["Vercraft-Switch.zip"]'
